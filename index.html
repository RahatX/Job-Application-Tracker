<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Application Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            page: "#f3f4f6",
            title: "#1f2937",
            body: "#6b7280",
            borderSoft: "#e5e7eb",
            blueTab: "#2563eb",
            interview: "#10b981",
            rejected: "#ef4444"
          },
          boxShadow: {
            card: "0 1px 2px rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.03)"
          }
        }
      }
    };
  </script>
</head>
<body class="bg-page">
  <main class="mx-auto max-w-[980px] px-4 py-8">
  <header class="text-center">
    <h1 class="text-[28px] font-extrabold text-title">
      Job Application Tracker
    </h1>
  </header>

  <section class="mt-8 grid grid-cols-1 gap-4 md:grid-cols-3">
    <div class="rounded-xl bg-white p-5 shadow-card">
      <p class="text-xs font-medium text-body">Total</p>
      <h2 id="totalCount" class="mt-2 text-[28px] font-extrabold text-blue-600">8</h2>
    </div>

    <div class="rounded-xl bg-white p-5 shadow-card">
      <p class="text-xs font-medium text-body">Interview</p>
      <h2 id="interviewCount" class="mt-2 text-[28px] font-extrabold text-emerald-500">0</h2>
    </div>

    <div class="rounded-xl bg-white p-5 shadow-card">
      <p class="text-xs font-medium text-body">Rejected</p>
      <h2 id="rejectedCount" class="mt-2 text-[28px] font-extrabold text-red-500">0</h2>
    </div>
  </section>

  <section class="mt-8">
  <div class="flex items-center justify-between">
    <h2 class="text-[20px] font-extrabold text-title">Available Jobs</h2>
    <p class="text-sm font-medium text-body"><span id="tabJobCount">8</span> jobs</p>
  </div>

  <div class="mt-4 flex items-center gap-2">
    <button data-tab="all" class="tab-btn rounded-md bg-blue-600 px-4 py-2 text-sm font-semibold text-white">
      All
    </button>
    <button data-tab="interview" class="tab-btn rounded-md bg-gray-200 px-4 py-2 text-sm font-semibold text-gray-600">
      Interview
    </button>
    <button data-tab="rejected" class="tab-btn rounded-md bg-gray-200 px-4 py-2 text-sm font-semibold text-gray-600">
      Rejected
    </button>
  </div>

  <div id="emptyState" class="mt-6 hidden rounded-xl bg-white px-6 py-16 text-center shadow-card">
    <img src="./jobs.png" alt="No jobs icon" class="mx-auto h-16 w-16 object-contain" />
    <h3 class="mt-4 text-[24px] font-extrabold text-title">No jobs available</h3>
    <p class="mt-2 text-sm text-body">Check back soon for new job opportunities</p>
  </div>

  <div id="jobList" class="mt-6 space-y-4"></div>
</section>
</main>

  <script src="./script.js"></script>
</body>
</html>
